<!DOCTYPE html>
<head>
    <link
        rel="stylesheet"
        href="//cdn.jsdelivr.net/highlight.js/8.7/styles/monokai_sublime.min.css"
    />
    <script src="https://unpkg.com/react@15/dist/react.js"></script>
    <script src="https://unpkg.com/react-dom@15/dist/react-dom.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-core/5.8.34/browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.12.0/highlight.min.js"></script>
</head>
<html style="max-height: 100vh">
    <body
        style="
            margin: 0px;
            height: 100%;
            background: linear-gradient(to right, black, #505759);
            overflow-x: hidden;
            overflow-y: hidden;
        "
    >
        <div id="root" style="height: 100%; width: 100%"></div>
    <script src="bundle.js?8a50ac9184a43c08fd20"></script></body>
        <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script>
        const getBrowserSize = () => {
            let div = document.createElement("div");
            div.style.position = "absolute";
            div.style.top = 0;
            div.style.left = 0;
            div.style.width = "100%";
            div.style.height = "100%";
            document.documentElement.appendChild(div);
            const results = {
                width: div.offsetWidth,
                height: div.offsetHeight,
            };
            div.parentNode.removeChild(div);
            return results;
        };

        const { width, height } = getBrowserSize();
        document.getElementById("root").style.minWidth = width + "px";
        document.getElementById("root").style.minHeight = height + "px";
    </script>
</html>
